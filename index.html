<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom | Ultra Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #08070b; --surface: #121019; --accent: #ff79c6; }
        body { background-color: var(--bg); color: #f8f8f2; font-family: 'Outfit', sans-serif; }
        .mesh-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% -20%, #2a1b3d 0%, transparent 50%), radial-gradient(circle at 0% 100%, #1a1025 0%, transparent 40%); z-index: -1; }
        .ultra-glass { background: rgba(18, 16, 25, 0.6); backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hero-gradient { background: linear-gradient(135deg, rgba(255, 121, 198, 0.1) 0%, rgba(189, 147, 249, 0.1) 100%); border: 1px solid rgba(255, 121, 198, 0.2); }
        .mod-card-ultra { background: var(--surface); border-radius: 24px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mod-card-ultra:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255, 121, 198, 0.1); }
        #auth-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-8">
    <div class="mesh-bg"></div>

    <div id="auth-overlay">
        <div class="ultra-glass p-10 rounded-[40px] w-full max-w-md border border-white/10">
            <h2 id="auth-title" class="text-3xl font-black mb-6 tracking-tighter uppercase">Loom Sign In</h2>
            <div class="space-y-4">
                <div id="signup-only-fields" style="display: none;">
                    <input type="text" id="auth-user" placeholder="Unique Username" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-sm mb-4">
                    <div class="flex gap-2 mb-4">
                        <button onclick="window.currentRole='Consumer'" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase border border-white/10">Consumer</button>
                        <button onclick="window.currentRole='Creator'" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase border border-white/10">Creator</button>
                    </div>
                </div>
                <input type="email" id="auth-email" placeholder="Email" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-sm">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-sm">
                <button id="auth-submit" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-pink-400 transition uppercase">Continue</button>
            </div>
            <button id="auth-toggle" class="text-[10px] font-black text-pink-500 uppercase mt-4">Create Account</button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <nav class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center rotate-3"><img src="https://geode-sdk.org/logo.png" class="w-8 h-8" style="filter: invert(1);"></div>
                <h1 class="text-3xl font-black tracking-tighter uppercase">LOOM</h1>
            </div>
            <div class="ultra-glass rounded-full px-6 py-3 flex items-center gap-6 border border-white/10">
                <a href="index.html" class="text-xs font-black hover:text-pink-400 uppercase">Browse</a>
                <a href="profile.html" id="profile-link" class="hidden text-xs font-black hover:text-pink-400 uppercase">Profile</a>
                <button id="signin-btn" class="bg-white text-black px-5 py-1.5 rounded-full text-xs font-black uppercase">Sign In</button>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-10">
            <aside class="space-y-8">
                <div class="ultra-glass rounded-[32px] p-8">
                    <label class="text-[10px] font-black text-gray-500 mb-2 block uppercase tracking-widest">Search Registry</label>
                    <input type="text" id="search-input" placeholder="Mod name..." class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-4 text-sm text-white">
                </div>
            </aside>

            <main class="space-y-8">
                <div class="hero-gradient rounded-[40px] p-10 border border-white/10">
                    <h2 class="text-5xl font-black mb-2 tracking-tighter uppercase">Registry</h2>
                    <p class="text-gray-400">The central hub for Loom framework assets.</p>
                </div>
                <div id="assets-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyClmE36o3vkujTdpSS84gBf-0DQIVlWrPQ", authDomain: "loom-ef2c8.firebaseapp.com", projectId: "loom-ef2c8", storageBucket: "loom-ef2c8.firebasestorage.app", messagingSenderId: "774949013487", appId: "1:774949013487:web:cf464b6b9db7d93cd7981a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Handlers
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('signin-btn').style.display = 'none';
                document.getElementById('profile-link').classList.remove('hidden');
            }
        });

        document.getElementById('signin-btn').onclick = () => document.getElementById('auth-overlay').style.display = 'flex';

        // Load Assets
        const assetsGrid = document.getElementById('assets-grid');
        onSnapshot(query(collection(db, "assets"), orderBy("createdAt", "desc")), (snap) => {
            assetsGrid.innerHTML = '';
            snap.forEach((d) => {
                const a = d.data();
                const isOwner = auth.currentUser && (a.creatorId === auth.currentUser.uid);
                assetsGrid.innerHTML += `
                    <div class="mod-card-ultra p-6 flex flex-col h-full cursor-pointer" onclick="location.href='asset.html?id=${d.id}'">
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-indigo-600 rounded-2xl flex items-center justify-center"><i class="fas fa-cube text-2xl text-white"></i></div>
                            <div class="text-right">
                                <span class="block text-xs font-mono text-pink-400 font-bold uppercase">${a.version}</span>
                                <span class="text-[8px] text-gray-600 font-black uppercase tracking-tighter">${a.tag}</span>
                            </div>
                        </div>
                        <h3 class="text-xl font-extrabold mb-2 uppercase">${a.name}</h3>
                        <p class="text-sm text-gray-400 flex-grow italic line-clamp-2">${a.description}</p>
                        <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] font-black text-gray-500 hover:text-pink-400 transition uppercase cursor-pointer" 
                                  onclick="event.stopPropagation(); location.href='profile.html?id=${a.creatorId}'">
                                By ${a.creatorName}
                            </span>
                            <div class="flex items-center gap-3">
                                <span class="text-[9px] text-gray-700 font-bold"><i class="fas fa-download mr-1"></i>${a.downloads || 0}</span>
                                ${isOwner ? `<button onclick="event.stopPropagation(); window.deleteAsset('${d.id}')" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    </div>`;
            });
        });

        window.deleteAsset = async (id) => { if(confirm("Delete asset?")) await deleteDoc(doc(db, "assets", id)); };
    </script>
</body>
</html>
